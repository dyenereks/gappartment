name: Daily ping
on:
  schedule:
    - cron: "0 12 12-20 * *"   # 12:00 UTC, days 12-20 of every month
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: prod
    env:
      LEYECO_SYNC_URL: ${{ vars.LEYECO_SYNC_URL }}
      LEYECO_SYNC_SECRET: ${{ secrets.LEYECO_SYNC_SECRET }}
    steps:
      - name: Curl URL with retries
        run: |
          curl --fail \
               --retry 3 \
               --retry-delay 30 \
               --retry-all-errors \
               -H "Authorization: Bearer $LEYECO_SYNC_SECRET" \
               "$LEYECO_SYNC_URL"
